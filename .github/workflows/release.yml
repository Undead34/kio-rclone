name: Release

on:
  push:
    tags:
      - 'v*'

# Elevated only in the one job that needs it (contents: write, to publish
# the Release). Only a tag push on this repo can reach this workflow at all --
# pull_request never triggers it, so a fork can't.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build the Arch package and publish the GitHub Release
    runs-on: ubuntu-24.04
    container:
      image: archlinux@sha256:212b1e518e94ee9c52be55e8a32da75fcf11e7b5610b80b49479e67880102406
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Check out source
        # actions/checkout@v5 (pin kept in sync with the other workflows)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install build dependencies
        # Keep this in sync with the AUR recipe's depends/makedepends.
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git cmake extra-cmake-modules ninja pkgconf \
            qt6-base kcoreaddons ki18n kio rclone appstream github-cli \
            pacman-contrib

      - name: Verify tag matches the project version
        # Catches the "bumped some files but not others" mistake. The three
        # in-repo version literals are kept in sync by scripts/bump-version.sh;
        # this step is the safety net when someone edits by hand. The AUR
        # recipe's pkgver lives in its own repository and is bumped there.
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          cmake_version="$(grep -oP 'project\(kio-rclone VERSION \K[0-9.]+' CMakeLists.txt)"
          package_json_version="$(grep -oP '"version":\s*"\K[0-9.]+' docs/package.json)"
          metainfo_version="$(grep -oP '<release version="\K[0-9.]+' app/org.kde.kio-rclone-config.metainfo.xml | head -1)"
          mismatches=()
          [[ "$tag_version" == "$cmake_version" ]] || mismatches+=("CMakeLists.txt ($cmake_version)")
          [[ "$tag_version" == "$package_json_version" ]] || mismatches+=("docs/package.json ($package_json_version)")
          [[ "$tag_version" == "$metainfo_version" ]] || mismatches+=("metainfo.xml ($metainfo_version)")
          if [[ ${#mismatches[@]} -gt 0 ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match: ${mismatches[*]}. Run scripts/bump-version.sh $tag_version, update CHANGELOG.md and metainfo.xml, commit, and retag."
            exit 1
          fi

      - name: Build the Arch package from the AUR recipe
        # Build the release binary the same way AUR users do: fetch the recipe,
        # point it at this tag, fill the real source hash (updpkgsums, no SKIP),
        # and run makepkg. makepkg compiles and runs ctest through the recipe's
        # build() and check(), so this is also the release build/test gate: if
        # the tag does not compile or a test fails, no Release is published.
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # makepkg refuses to run as root, so build as an unprivileged user.
          useradd -m builder
          git clone --depth 1 https://aur.archlinux.org/kio-rclone.git /home/builder/pkg
          sed -i "s/^pkgver=.*/pkgver=$version/" /home/builder/pkg/PKGBUILD
          chown -R builder:builder /home/builder/pkg
          su - builder -c 'cd ~/pkg && updpkgsums && makepkg -f --noconfirm'
          install -d dist
          cp /home/builder/pkg/*.pkg.tar.zst dist/
          ( cd dist && sha256sum *.pkg.tar.zst > SHA256SUMS )

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # GitHub attaches the source tarballs automatically; add the built
          # Arch package and its checksum for testers who prefer pacman -U over
          # building from the AUR.
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*.pkg.tar.zst dist/SHA256SUMS
